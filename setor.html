<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhamento de Envios</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
<style>
  :root{--bg:#f4f5f7;--surface:#fff;--surface2:#f0f1f3;--border:#dde1e7;--text:#1a1d23;--text2:#6b7280;--accent:#2563eb;--success:#16a34a;--danger:#dc2626;--warning:#d97706;--tag-bg:#eff6ff;--tag-text:#2563eb;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);--radius:10px;}
  body.dark{--bg:#0f1117;--surface:#1a1d24;--surface2:#22262f;--border:#2e3340;--text:#e8eaf0;--text2:#8b93a7;--tag-bg:#1e2a47;--tag-text:#93c5fd;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:8px;}
  .logo{font-weight:700;font-size:15px;}.logo span{color:var(--accent);}
  .setor-pill{background:var(--tag-bg);color:var(--tag-text);border-radius:99px;padding:4px 14px;font-size:13px;font-weight:700;}
  .theme-btn{border:1px solid var(--border);background:var(--surface2);color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;}
  .tabs{display:flex;gap:2px;background:var(--surface2);border-radius:10px;padding:4px;border:1px solid var(--border);}
  .tab-btn{border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:500;padding:7px 14px;border-radius:7px;cursor:pointer;}
  .tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1);}
  .container{max-width:960px;margin:0 auto;padding:24px 20px;}
  .page{display:none;}.page.active{display:block;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);}
  .stat-num{font-size:28px;font-weight:800;}.stat-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
  .n-total{color:var(--accent);}.n-aguardando{color:var(--warning);}.n-transito{color:var(--accent);}.n-entregue{color:var(--success);}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
  .filters input,.filters select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:13px;outline:none;}
  .filters input{flex:1;min-width:180px;}
  .btn-ref{border:1px solid var(--border);background:var(--surface);color:var(--text2);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;}
  .btn-ref:hover{color:var(--accent);border-color:var(--accent);}
  .envios-grid{display:flex;flex-direction:column;gap:10px;}
  .envio-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;}
  .envio-destino{font-size:15px;font-weight:700;margin-bottom:4px;}
  .envio-desc{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.5;}
  .envio-meta{display:flex;gap:14px;flex-wrap:wrap;}
  .envio-meta span{font-size:12px;color:var(--text2);}
  .status-badge{display:inline-block;border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;white-space:nowrap;}
  .s-aguardando{background:#fef3c7;color:#92400e;}.s-transito{background:#dbeafe;color:#1e40af;}.s-entregue{background:#dcfce7;color:#166534;}.s-atrasado{background:#fee2e2;color:#991b1b;}.s-pendente{background:#ede9fe;color:#6d28d9;}.s-cancelado{background:#fee2e2;color:#991b1b;}
  body.dark .s-aguardando{background:#3d2c00;color:#fcd34d;}body.dark .s-transito{background:#1e2f55;color:#93c5fd;}body.dark .s-entregue{background:#14302a;color:#4ade80;}body.dark .s-atrasado{background:#3b1212;color:#fca5a5;}body.dark .s-pendente{background:#2e1065;color:#c4b5fd;}body.dark .s-cancelado{background:#3b1212;color:#fca5a5;}
  .rastreio-box{margin-top:8px;background:var(--surface2);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--text2);}
  .rastreio-box.tem{color:var(--accent);font-weight:600;font-family:monospace;}
  .empty-state,.loading{text-align:center;padding:60px;color:var(--text2);}
  .update-time{font-size:12px;color:var(--text2);text-align:right;margin-bottom:12px;}
  @media(max-width:600px){.stats{grid-template-columns:1fr 1fr;}.envio-card{grid-template-columns:1fr;}}

  /* REGISTRO FORM */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;box-shadow:var(--shadow);}
  .card-title{font-size:14px;font-weight:700;margin-bottom:18px;}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .form-grid .full{grid-column:1/-1;}
  .field label{font-size:11px;font-weight:600;color:var(--text2);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:13px;outline:none;font-family:inherit;}
  .field textarea{resize:vertical;min-height:64px;}
  .item-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;}
  .item-row-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .item-num{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;}
  .btn-rm{background:transparent;border:none;color:var(--text2);font-size:18px;cursor:pointer;}
  .btn-add{border:1px dashed var(--border);background:transparent;color:var(--accent);border-radius:8px;padding:10px;width:100%;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:16px;}
  .btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer;width:100%;}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;}
  .success-box{background:var(--surface);border:2px solid var(--success);border-radius:var(--radius);padding:28px;text-align:center;}
  .success-code{font-size:28px;font-weight:900;letter-spacing:3px;color:var(--success);background:var(--surface2);border-radius:8px;padding:14px;margin:16px 0;font-family:monospace;}

  /* PENDENTES */
  .pend-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:10px;}
  .pend-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px;}
  .pend-code{font-family:monospace;font-weight:700;font-size:15px;color:var(--accent);}
  .pend-itens{font-size:13px;color:var(--text2);margin-bottom:10px;}
  .pend-item-line{padding:4px 0;border-bottom:1px solid var(--border);}
  .pend-item-line:last-child{border-bottom:none;}
  .btn-cancel{border:1px solid var(--danger);background:transparent;color:var(--danger);border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="logo">Protocolo <span>Saída</span></div>
    <div class="setor-pill" id="setor-pill">—</div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" id="tab-acomp" onclick="irPara('acomp',this)">📊 Acompanhar</button>
    <button class="tab-btn" id="tab-registro" onclick="irPara('registro',this)">📝 Registro</button>
    <button class="tab-btn" id="tab-pendentes" onclick="irPara('pendentes',this)">🕓 Meus Pendentes</button>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <button class="theme-btn" onclick="toggleTema()">🌙</button>
  </div>
</div>

<div class="container">

  <!-- ACOMPANHAMENTO -->
  <div class="page active" id="page-acomp">
    <div class="stats">
      <div class="stat-card"><div class="stat-num n-total" id="st-total">—</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num n-aguardando" id="st-aguardando">—</div><div class="stat-label">Aguardando</div></div>
      <div class="stat-card"><div class="stat-num n-transito" id="st-transito">—</div><div class="stat-label">Em Trânsito</div></div>
      <div class="stat-card"><div class="stat-num n-entregue" id="st-entregue">—</div><div class="stat-label">Entregue</div></div>
    </div>
    <div class="filters">
      <input type="text" id="f-busca" placeholder="Buscar destino ou descrição..." oninput="render()">
      <select id="f-status" onchange="render()">
        <option value="">Todos os status</option>
        <option>AGUARDANDO SAÍDA</option><option>EM TRÂNSITO</option><option>ENTREGUE</option><option>ATRASADO</option>
      </select>
      <input type="date" id="f-data" onchange="render()">
      <button class="btn-ref" onclick="carregar()">↺ Atualizar</button>
    </div>
    <div class="update-time" id="update-time"></div>
    <div class="envios-grid" id="grid"><div class="loading">Carregando...</div></div>
  </div>

  <!-- REGISTRO (pré-registro / pendentes) -->
  <div class="page" id="page-registro">
    <div id="reg-form">
      <div class="card">
        <div class="card-title">📝 Itens a serem entregues</div>
        <div id="itens-list"></div>
        <button class="btn-add" onclick="addItem()">+ Adicionar item</button>
        <button class="btn-primary" id="btn-gerar" onclick="gerarPendente()">Gerar código de protocolo</button>
      </div>
    </div>
    <div id="reg-sucesso" style="display:none">
      <div class="success-box">
        <div style="font-size:40px;margin-bottom:8px;">✅</div>
        <div style="font-size:16px;font-weight:700;">Protocolo registrado!</div>
        <div style="color:var(--text2);font-size:13px;margin-top:6px;">Anote ou tire print deste código. Apresente-o na entrega física.</div>
        <div class="success-code" id="codigo-gerado"></div>
        <button class="btn-ref" style="width:100%" onclick="novoRegistro()">+ Novo registro</button>
      </div>
    </div>
  </div>

  <!-- MEUS PENDENTES -->
  <div class="page" id="page-pendentes">
    <div class="update-time" style="text-align:left" id="pend-info">Pré-registros aguardando entrega física</div>
    <div id="pendentes-grid"><div class="loading">Carregando...</div></div>
  </div>

</div>

function irPara(aba,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+aba).classList.add('active');
  btn.classList.add('active');
  if(aba==='pendentes') carregarPendentes();
}

async function carregar(){
  document.getElementById('grid').innerHTML='<div class="loading">Carregando...</div>';
  try{
    let url=`${SB_URL}/rest/v1/protocolo_envios?deleted_at=is.null&order=data_entrega.desc,horario_entrega.desc&limit=500`;
    if(SETORES.length===1) url+=`&setor=eq.${encodeURIComponent(SETORES[0])}`;
    else if(SETORES.length>1) url+=`&setor=in.(${SETORES.map(s=>encodeURIComponent(s)).join(',')})`;
    const res=await fetch(url,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    todos=await res.json();
    document.getElementById('update-time').textContent='Última atualização: '+new Date().toLocaleTimeString('pt-BR');
    render();
  }catch(e){document.getElementById('grid').innerHTML='<div class="empty-state">Erro ao carregar.</div>';}
}

function render(){
  const busca=document.getElementById('f-busca').value.toLowerCase();
  const status=document.getElementById('f-status').value;
  const data=document.getElementById('f-data').value;
  let dados=todos.filter(r=>{
    if(status&&r.status_envio!==status) return false;
    if(data&&r.data_entrega!==data) return false;
    if(busca&&!`${r.destino} ${r.descricao_item}`.toLowerCase().includes(busca)) return false;
    return true;
  });
  document.getElementById('st-total').textContent=todos.length;
  document.getElementById('st-aguardando').textContent=todos.filter(r=>r.status_envio==='AGUARDANDO SAÍDA').length;
  document.getElementById('st-transito').textContent=todos.filter(r=>r.status_envio==='EM TRÂNSITO').length;
  document.getElementById('st-entregue').textContent=todos.filter(r=>r.status_envio==='ENTREGUE').length;
  const grid=document.getElementById('grid');
  if(!dados.length){grid.innerHTML='<div class="empty-state">Nenhum envio encontrado.</div>';return;}
  grid.innerHTML=dados.map(r=>{
    const sc=r.status_envio==='AGUARDANDO SAÍDA'?'s-aguardando':r.status_envio==='EM TRÂNSITO'?'s-transito':r.status_envio==='ENTREGUE'?'s-entregue':'s-atrasado';
    const dataFmt=r.data_entrega?.split('-').reverse().join('/');
    const rastreioHtml=r.rastreio
      ?`<div class="rastreio-box tem">📦 ${r.transportadora?r.transportadora+': ':''}${r.rastreio}</div>`
      :`<div class="rastreio-box">Rastreio ainda não disponível</div>`;
    return`<div class="envio-card">
      <div>
        <div class="envio-destino">📍 ${r.destino}</div>
        <div class="envio-desc">${r.descricao_item}</div>
        <div class="envio-meta">
          <span>👤 ${r.entregue}</span>
          <span>📅 ${dataFmt} às ${r.horario_entrega?.slice(0,5)}</span>
          <span>📤 ${r.tipo_envio||'SEMANAL'}</span>
          ${r.prazo?`<span>⏱ Prazo: ${r.prazo}d</span>`:''}
          ${r.num_os?`<span>🔧 OS: ${r.num_os}</span>`:''}
          ${r.observacao?`<span>📝 ${r.observacao}</span>`:''}
        </div>
        ${rastreioHtml}
      </div>
      <div><span class="status-badge ${sc}">${r.status_envio}</span></div>
    </div>`;
  }).join('');
}

carregar();
setInterval(carregar,120000);

var DESTINOS=DESTINOS_PRAZO.map(d=>d[0]);

var itensReg=[];
function addItem(){
  itensReg.push({id:Date.now(),destino:'',descricao:'',data_prevista:''});
  renderItensReg();
}
function removeItemReg(id){itensReg=itensReg.filter(i=>i.id!==id);renderItensReg();}
function updateItemReg(id,campo,val){
  var item=itensReg.find(x=>x.id===id);
  if(item) item[campo]=val;
}
function renderItensReg(){
  document.getElementById('itens-list').innerHTML=itensReg.map((item,idx)=>{
    var opts='<option value="">Selecione...</option>'+DESTINOS.map(d=>`<option value="${d}" ${d===item.destino?'selected':''}>${d}</option>`).join('');
    return `<div class="item-row">
      <div class="item-row-hd"><span class="item-num">Item ${idx+1}</span>
      ${itensReg.length>1?`<button class="btn-rm" onclick="removeItemReg(${item.id})">×</button>`:''}</div>
      <div class="form-grid">
        <div class="field full"><label>PDV de destino</label><select onchange="updateItemReg(${item.id},'destino',this.value)">${opts}</select></div>
        <div class="field full"><label>Descrição do produto</label><textarea onchange="updateItemReg(${item.id},'descricao',this.value)">${item.descricao}</textarea></div>
        <div class="field full"><label>Data prevista de envio</label><input type="date" value="${item.data_prevista}" onchange="updateItemReg(${item.id},'data_prevista',this.value)"></div>

    </div>`;
  }).join('');
}
addItem();

function gerarCodigoPendente(){
  var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var c='';for(var i=0;i<8;i++) c+=chars.charAt(Math.floor(Math.random()*chars.length));
  return 'P-'+c;
}

async function gerarPendente(){
  if(!itensReg.length||itensReg.some(i=>!i.destino||!i.descricao)){
    alert('Preencha destino e descrição de todos os itens.');
    return;
  }
  var btn=document.getElementById('btn-gerar');
  btn.disabled=true;btn.textContent='Gerando...';
  var codigo=gerarCodigoPendente();
  try{
    var res=await fetch(SB_URL+'/rest/v1/protocolo_pendentes',{
      method:'POST',headers:H,
      body:JSON.stringify({codigo:codigo,setor:SETOR_PARAM,itens:itensReg,status:'PENDENTE'})
    });
    if(!res.ok) throw new Error();
    document.getElementById('reg-form').style.display='none';
    document.getElementById('reg-sucesso').style.display='block';
    document.getElementById('codigo-gerado').textContent=codigo;
  }catch(e){
    alert('Erro ao gerar protocolo. Tente novamente.');
  }
  btn.disabled=false;btn.textContent='Gerar código de protocolo';
}

function novoRegistro(){
  itensReg=[];addItem();
  document.getElementById('reg-form').style.display='block';
  document.getElementById('reg-sucesso').style.display='none';
}

// PENDENTES
async function carregarPendentes(){
  document.getElementById('pendentes-grid').innerHTML='<div class="loading">Carregando...</div>';
  try{
    var url=SB_URL+'/rest/v1/protocolo_pendentes?setor=eq.'+encodeURIComponent(SETOR_PARAM)+'&order=created_at.desc&limit=100';
    var res=await fetch(url,{headers:H});
    todosPendentes=await res.json();
    renderPendentes();
  }catch(e){document.getElementById('pendentes-grid').innerHTML='<div class="empty-state">Erro ao carregar.</div>';}
}

function renderPendentes(){
  var c=document.getElementById('pendentes-grid');
  if(!todosPendentes.length){c.innerHTML='<div class="empty-state">Nenhum pré-registro ainda.</div>';return;}
  c.innerHTML=todosPendentes.map(function(p){
    var statusClass=p.status==='PENDENTE'?'s-pendente':p.status==='USADO'?'s-entregue':'s-cancelado';
    var dt=new Date(p.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    var itensHtml=p.itens.map(function(i){
      return '<div class="pend-item-line"><strong>'+i.destino+'</strong> — '+i.descricao+'</div>';
    }).join('');
    return '<div class="pend-card">'+
      '<div class="pend-top">'+
        '<div><div class="pend-code">'+p.codigo+'</div><div style="font-size:11px;color:var(--text2);margin-top:2px;">Criado em '+dt+'</div></div>'+
        '<span class="status-badge '+statusClass+'">'+p.status+'</span>'+
      '</div>'+
      '<div class="pend-itens">'+itensHtml+'</div>'+
      (p.status==='PENDENTE'?'<button class="btn-cancel" onclick="cancelarPendente(\''+p.id+'\')">Cancelar</button>':'')+
    '</div>';
  }).join('');
}

async function cancelarPendente(id){
  if(!confirm('Cancelar este pré-registro?')) return;
  try{
    var res=await fetch(SB_URL+'/rest/v1/protocolo_pendentes?id=eq.'+id,{
      method:'PATCH',headers:H,
      body:JSON.stringify({status:'CANCELADO',cancelado_at:new Date().toISOString()})
    });
    if(!res.ok) throw new Error();
    await carregarPendentes();
  }catch(e){alert('Erro ao cancelar.');}
}
</script>
