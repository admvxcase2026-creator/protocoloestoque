<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotografar Papel</title>
<style>
  :root{--bg:#0f1117;--surface:#1a1d24;--border:#2e3340;--text:#e8eaf0;--text2:#8b93a7;--accent:#2563eb;--success:#16a34a;--danger:#dc2626;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
  .logo{font-size:14px;font-weight:700;color:var(--text2);margin-bottom:24px;}
  .logo span{color:var(--accent);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:420px;text-align:center;}
  .card h2{font-size:18px;margin-bottom:8px;}
  .card p{color:var(--text2);font-size:13px;margin-bottom:24px;line-height:1.5;}
  .preview-wrap{border-radius:12px;overflow:hidden;background:#000;margin-bottom:20px;display:none;}
  .preview-wrap img{width:100%;display:block;max-height:300px;object-fit:contain;}
  .btn{width:100%;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:opacity .15s;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-cam{background:var(--accent);color:#fff;}
  .btn-confirm{background:var(--success);color:#fff;display:none;}
  .btn-retry{background:var(--surface);color:var(--text);border:1px solid var(--border);display:none;}
  .status{font-size:13px;color:var(--text2);margin-top:8px;min-height:20px;line-height:1.6;}
  .status.err{color:var(--danger);}
  .progress-bar{width:100%;height:6px;background:var(--border);border-radius:99px;margin-top:10px;display:none;overflow:hidden;}
  .progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s;width:0%;}
  input[type=file]{display:none;}
  .done-card{display:none;text-align:center;}
  .done-icon{font-size:56px;margin-bottom:12px;}
  .done-card h2{font-size:20px;margin-bottom:8px;color:var(--success);}
  .done-card p{color:var(--text2);font-size:13px;line-height:1.6;}
  .transcricao-box{background:#0d1f0d;border:1px solid #16a34a44;border-radius:10px;padding:14px;margin-top:14px;text-align:left;font-size:13px;color:#4ade80;line-height:1.6;white-space:pre-wrap;}
</style>
</head>
<body>

<div class="logo">Protocolo <span>Saída</span></div>

<div class="card" id="main-card">
  <h2>📄 Fotografar Papel</h2>
  <p>Aponte a câmera para o papel e tire a foto. O texto será lido automaticamente.</p>
  <div class="preview-wrap" id="preview-wrap">
    <img id="preview-img" src="" alt="preview">
  </div>
  <input type="file" id="file-input" accept="image/*" capture="environment">
  <button class="btn btn-cam" id="btn-cam" onclick="abrirCamera()">📷 Abrir câmera</button>
  <button class="btn btn-confirm" id="btn-confirm" onclick="processar()">✔ Confirmar e ler texto</button>
  <button class="btn btn-retry" id="btn-retry" onclick="abrirCamera()">↺ Tirar outra foto</button>
  <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="status" id="status"></div>
</div>

<div class="done-card" id="done-card">
  <div class="done-icon">✅</div>
  <h2>Texto enviado!</h2>
  <p>O campo foi preenchido automaticamente no sistema.<br>Pode fechar essa tela.</p>
  <div class="transcricao-box" id="transcricao-box"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
const SB_URL='https://fevhyllvfhvzzfhwyjuk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZldmh5bGx2Zmh2enpmaHd5anVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzEyMTcsImV4cCI6MjA5NDQ0NzIxN30.GJRgEKW1bVWX1957_bKCTO6aVmR_rXWRCmo9-ZJDPiE';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

var params=new URLSearchParams(location.search);
var SESSAO=params.get('sessao');
var fotoDataURL=null;

if(!SESSAO){
  setStatus('QR Code inválido.','err');
  document.getElementById('btn-cam').disabled=true;
}

var fileInput=document.getElementById('file-input');
fileInput.addEventListener('change',function(){
  if(!fileInput.files||!fileInput.files[0]) return;
  var reader=new FileReader();
  reader.onload=function(e){
    fotoDataURL=e.target.result;
    document.getElementById('preview-img').src=fotoDataURL;
    document.getElementById('preview-wrap').style.display='block';
    document.getElementById('btn-confirm').style.display='block';
    document.getElementById('btn-retry').style.display='block';
    document.getElementById('btn-cam').style.display='none';
    setStatus('Foto pronta. Confirme para ler o texto.');
  };
  reader.readAsDataURL(fileInput.files[0]);
});

function abrirCamera(){
  fileInput.value='';
  fotoDataURL=null;
  document.getElementById('preview-wrap').style.display='none';
  document.getElementById('btn-confirm').style.display='none';
  document.getElementById('btn-retry').style.display='none';
  document.getElementById('btn-cam').style.display='block';
  document.getElementById('progress-bar').style.display='none';
  document.getElementById('progress-fill').style.width='0%';
  setStatus('');
  fileInput.click();
}

async function processar(){
  if(!fotoDataURL) return;
  document.getElementById('btn-confirm').disabled=true;
  document.getElementById('btn-confirm').textContent='⏳ Lendo...';
  document.getElementById('btn-retry').style.display='none';
  document.getElementById('progress-bar').style.display='block';
  setStatus('⏳ Reconhecendo o texto da imagem...');

  try{
    var resultado=await Tesseract.recognize(fotoDataURL,'por',{
      logger:function(m){
        if(m.status==='recognizing text'){
          var pct=Math.round((m.progress||0)*100);
          document.getElementById('progress-fill').style.width=pct+'%';
          setStatus('⏳ Lendo texto... '+pct+'%');
        }
      }
    });

    var texto=resultado.data.text.trim();
    // limpa linhas vazias extras
    texto=texto.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0;}).join('\n');

    if(!texto||texto.length<3) throw new Error('Não foi possível ler o texto. Tente uma foto mais nítida.');

    setStatus('⏳ Enviando para o sistema...');
    document.getElementById('progress-fill').style.width='100%';

    var res=await fetch(SB_URL+'/rest/v1/protocolo_fotos_temp',{
      method:'POST',
      headers:H,
      body:JSON.stringify({sessao_id:SESSAO,foto_base64:'',media_type:'image/jpeg',texto_transcrito:texto,usado:false})
    });
    if(!res.ok) throw new Error('Erro ao salvar no sistema.');

    document.getElementById('main-card').style.display='none';
    document.getElementById('done-card').style.display='block';
    document.getElementById('transcricao-box').textContent=texto;

  }catch(e){
    setStatus('❌ '+e.message,'err');
    document.getElementById('btn-confirm').disabled=false;
    document.getElementById('btn-confirm').textContent='✔ Confirmar e ler texto';
    document.getElementById('btn-retry').style.display='block';
    document.getElementById('progress-bar').style.display='none';
  }
}

function setStatus(msg,type){
  var el=document.getElementById('status');
  el.textContent=msg;
  el.className='status'+(type?' '+type:'');
}
</script>
</body>
</html>
