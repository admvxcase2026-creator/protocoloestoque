<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmação de Entrega</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✅</text></svg>">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#09090b;color:#fafafa;font-family:'Inter',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#111113;border:1px solid #27272a;border-radius:16px;padding:28px 20px;max-width:420px;width:100%;box-sizing:border-box;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.5);}
  .icon{font-size:56px;margin-bottom:16px;}
  h2{font-size:22px;font-weight:800;margin-bottom:8px;letter-spacing:-.4px;}
  p{color:#a1a1aa;font-size:14px;line-height:1.6;margin-bottom:20px;}
  .info-box{background:#18181b;border:1px solid #27272a;border-radius:10px;padding:16px;text-align:left;margin-bottom:20px;}
  .info-row{display:flex;justify-content:space-between;gap:10px;margin-bottom:8px;font-size:13px;flex-wrap:wrap;}
  .info-val{word-break:break-word;}
  .info-row:last-child{margin-bottom:0;}
  .info-label{color:#71717a;font-weight:500;}
  .info-val{color:#fafafa;font-weight:600;text-align:right;}
  .badge-ok{display:inline-block;background:#14301f;border:1px solid rgba(34,197,94,.3);color:#22c55e;border-radius:99px;padding:6px 18px;font-size:13px;font-weight:700;}
  .badge-err{display:inline-block;background:#3b1212;border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:99px;padding:6px 18px;font-size:13px;font-weight:700;}
  .loading{color:#71717a;font-size:14px;}
  .fname{text-align:left;margin-bottom:20px;}
  .fname label{font-size:11px;font-weight:600;color:#a1a1aa;display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;}
  .fname input{width:100%;box-sizing:border-box;padding:11px 14px;border:2px solid #3f3f46;border-radius:10px;background:#18181b;color:#fafafa;font-size:17px;font-weight:600;outline:none;font-family:inherit;text-transform:uppercase;letter-spacing:.3px;}
  .fname input:focus{border-color:#6366f1;}
  .fname input.erro{border-color:#ef4444;}
</style>
</head>
<body>
<div class="card">
  <div id="content"><div class="icon">⏳</div><p class="loading">Verificando código...</p></div>
</div>
<script>
const SB_URL='https://fevhyllvfhvzzfhwyjuk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZldmh5bGx2Zmh2enpmaHd5anVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzEyMTcsImV4cCI6MjA5NDQ0NzIxN30.GJRgEKW1bVWX1957_bKCTO6aVmR_rXWRCmo9-ZJDPiE';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

var codigo=(new URLSearchParams(location.search)).get('c');

var dadosItem=null;

async function carregar(){
  var el=document.getElementById('content');
  if(!codigo){
    el.innerHTML='<div class="icon">❌</div><h2>QR Code inválido</h2><p>Este código não é válido.</p>';
    return;
  }
  try{
    var res=await fetch(SB_URL+'/rest/v1/protocolo_envios?codigo_bipagem=eq.'+encodeURIComponent(codigo)+'&deleted_at=is.null&limit=1',{headers:H});
    var rows=await res.json();
    if(!rows||!rows.length){
      el.innerHTML='<div class="icon">❌</div><h2>Código não encontrado</h2><p>Este item não existe ou já foi removido do sistema.</p>';
      return;
    }
    var r=rows[0];
    if(r.bipado_em){
      var dt=new Date(r.bipado_em).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      el.innerHTML='<div class="icon">⚠️</div><h2>Já confirmado</h2><p>Este recebimento já foi confirmado em '+dt+'.</p>'+
        '<div class="info-box"><div class="info-row"><span class="info-label">Destino</span><span class="info-val">'+r.destino+'</span></div><div class="info-row"><span class="info-label">Item</span><span class="info-val">'+r.descricao_item+'</span></div></div>'+
        '<span class="badge-err">Já utilizado</span>';
      return;
    }
    dadosItem=r;
    var nomeRemetente=r.registrado_por||r.entregue;
    el.innerHTML='<div class="icon">📦</div><h2>Confirmar recebimento</h2><p>Verifique os dados abaixo e informe seu nome para confirmar.</p>'+
      '<div class="info-box">'+
        '<div class="info-row"><span class="info-label">Destino</span><span class="info-val">'+r.destino+'</span></div>'+
        '<div class="info-row"><span class="info-label">Item</span><span class="info-val">'+r.descricao_item+'</span></div>'+
        '<div class="info-row"><span class="info-label">Enviado por</span><span class="info-val">'+nomeRemetente+'</span></div>'+
        (r.prazo?'<div class="info-row"><span class="info-label">Prazo</span><span class="info-val">'+r.prazo+' dias</span></div>':'')+
      '</div>'+
      '<div class="fname"><label>SEU NOME (QUEM ESTÁ RECEBENDO)</label><input type="text" id="nome-recebedor-loja" placeholder="DIGITE SEU NOME" oninput="validarNome(this)"></div>'+
      '<button id="btn-confirmar" onclick="confirmarRecebimento()" disabled style="width:100%;background:#22c55e;color:#fff;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;opacity:.4;">✔ Confirmar recebimento</button>';
    document.getElementById('nome-recebedor-loja').focus();
  }catch(e){
    el.innerHTML='<div class="icon">❌</div><h2>Erro</h2><p>Não foi possível carregar. Tente novamente.</p>';
  }
}

function validarNome(input){
  var upper=input.value.toUpperCase();
  input.value=upper;
  var btn=document.getElementById('btn-confirmar');
  var valido=upper.trim().length>=3;
  btn.disabled=!valido;
  btn.style.opacity=valido?'1':'.4';
  input.classList.remove('erro');
}

async function confirmarRecebimento(){
  if(!dadosItem) return;
  var nomeInput=document.getElementById('nome-recebedor-loja');
  var nomeRecebeu=nomeInput.value.trim().toUpperCase();
  if(!nomeRecebeu||nomeRecebeu.length<3){
    nomeInput.classList.add('erro');
    nomeInput.focus();
    return;
  }
  var btn=document.getElementById('btn-confirmar');
  btn.disabled=true;btn.textContent='Confirmando...';btn.style.opacity='.6';
  try{
    var agora=new Date().toISOString();
    var patch=await fetch(SB_URL+'/rest/v1/protocolo_envios?id=eq.'+dadosItem.id,{
      method:'PATCH',headers:H,
      body:JSON.stringify({status_envio:'ENTREGUE',bipado_em:agora,codigo_bipagem:null,nome_quem_recebeu_loja:nomeRecebeu})
    });
    if(!patch.ok) throw new Error();
    var dt2=new Date(agora).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    document.getElementById('content').innerHTML='<div class="icon">✅</div><h2>Entrega confirmada!</h2><p>Recebimento registrado por <strong>'+nomeRecebeu+'</strong> em '+dt2+'.</p>'+
      '<div class="info-box">'+
        '<div class="info-row"><span class="info-label">Destino</span><span class="info-val">'+dadosItem.destino+'</span></div>'+
        '<div class="info-row"><span class="info-label">Item</span><span class="info-val">'+dadosItem.descricao_item+'</span></div>'+
      '</div>'+
      '<span class="badge-ok">✓ Entregue</span>';
  }catch(e){
    btn.disabled=false;btn.textContent='✔ Confirmar recebimento';btn.style.opacity='1';
  }
}
carregar();
</script>
</body>
</html>
