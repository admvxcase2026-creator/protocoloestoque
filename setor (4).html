<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhamento de Envios</title>
<style>
  :root{--bg:#f4f5f7;--surface:#fff;--surface2:#f0f1f3;--border:#dde1e7;--text:#1a1d23;--text2:#6b7280;--accent:#2563eb;--success:#16a34a;--danger:#dc2626;--warning:#d97706;--tag-bg:#eff6ff;--tag-text:#2563eb;--shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.06);--radius:10px;}
  body.dark{--bg:#0f1117;--surface:#1a1d24;--surface2:#22262f;--border:#2e3340;--text:#e8eaf0;--text2:#8b93a7;--tag-bg:#1e2a47;--tag-text:#93c5fd;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-weight:700;font-size:15px;}.logo span{color:var(--accent);}
  .setor-pill{background:var(--tag-bg);color:var(--tag-text);border-radius:99px;padding:4px 14px;font-size:13px;font-weight:700;}
  .theme-btn{border:1px solid var(--border);background:var(--surface2);color:var(--text2);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;}
  .container{max-width:960px;margin:0 auto;padding:24px 20px;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow);}
  .stat-num{font-size:28px;font-weight:800;}.stat-label{font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
  .n-total{color:var(--accent);}.n-aguardando{color:var(--warning);}.n-transito{color:var(--accent);}.n-entregue{color:var(--success);}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
  .filters input,.filters select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-size:13px;outline:none;}
  .filters input{flex:1;min-width:180px;}
  .btn-ref{border:1px solid var(--border);background:var(--surface);color:var(--text2);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;}
  .btn-ref:hover{color:var(--accent);border-color:var(--accent);}
  .envios-grid{display:flex;flex-direction:column;gap:10px;}
  .envio-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start;}
  .envio-destino{font-size:15px;font-weight:700;margin-bottom:4px;}
  .envio-desc{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.5;}
  .envio-meta{display:flex;gap:14px;flex-wrap:wrap;}
  .envio-meta span{font-size:12px;color:var(--text2);}
  .status-badge{display:inline-block;border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;white-space:nowrap;}
  .s-aguardando{background:#fef3c7;color:#92400e;}.s-transito{background:#dbeafe;color:#1e40af;}.s-entregue{background:#dcfce7;color:#166534;}.s-atrasado{background:#fee2e2;color:#991b1b;}
  body.dark .s-aguardando{background:#3d2c00;color:#fcd34d;}body.dark .s-transito{background:#1e2f55;color:#93c5fd;}body.dark .s-entregue{background:#14302a;color:#4ade80;}body.dark .s-atrasado{background:#3b1212;color:#fca5a5;}
  .rastreio-box{margin-top:8px;background:var(--surface2);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--text2);}
  .rastreio-box.tem{color:var(--accent);font-weight:600;font-family:monospace;}
  .empty-state,.loading{text-align:center;padding:60px;color:var(--text2);}
  .update-time{font-size:12px;color:var(--text2);text-align:right;margin-bottom:12px;}
  @media(max-width:600px){.stats{grid-template-columns:1fr 1fr;}.envio-card{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="logo">Protocolo <span>Saída</span></div>
    <div class="setor-pill" id="setor-pill">—</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center;">
    <span style="font-size:12px;color:var(--text2)" id="last-update"></span>
    <button class="theme-btn" onclick="toggleTema()">🌙</button>
  </div>
</div>

<div class="container">
  <div class="stats">
    <div class="stat-card"><div class="stat-num n-total" id="st-total">—</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num n-aguardando" id="st-aguardando">—</div><div class="stat-label">Aguardando</div></div>
    <div class="stat-card"><div class="stat-num n-transito" id="st-transito">—</div><div class="stat-label">Em Trânsito</div></div>
    <div class="stat-card"><div class="stat-num n-entregue" id="st-entregue">—</div><div class="stat-label">Entregue</div></div>
  </div>
  <div class="filters">
    <input type="text" id="f-busca" placeholder="Buscar destino ou descrição..." oninput="render()">
    <select id="f-status" onchange="render()">
      <option value="">Todos os status</option>
      <option>AGUARDANDO SAÍDA</option><option>EM TRÂNSITO</option><option>ENTREGUE</option><option>ATRASADO</option>
    </select>
    <input type="date" id="f-data" onchange="render()">
    <button class="btn-ref" onclick="carregar()">↺ Atualizar</button>
  </div>
  <div class="update-time" id="update-time"></div>
  <div class="envios-grid" id="grid"><div class="loading">Carregando...</div></div>
</div>

<script>
const SB_URL='https://fevhyllvfhvzzfhwyjuk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZldmh5bGx2Zmh2enpmaHd5anVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzEyMTcsImV4cCI6MjA5NDQ0NzIxN30.GJRgEKW1bVWX1957_bKCTO6aVmR_rXWRCmo9-ZJDPiE';

(()=>document.body.classList.toggle('dark',(localStorage.getItem('tema')||'light')==='dark'))();
function toggleTema(){document.body.classList.toggle('dark');localStorage.setItem('tema',document.body.classList.contains('dark')?'dark':'light');}

const params=new URLSearchParams(location.search);
const SETOR_PARAM=(params.get('setor')||'').toUpperCase().trim();

// Grupos de setores compartilhados
const GRUPOS_SETOR={
  'RH':['RH','FINANCEIRO'],
  'FINANCEIRO':['RH','FINANCEIRO'],
  'LABORATÓRIO':['LABORATÓRIO','GARANTIA'],
  'LABORATORIO':['LABORATÓRIO','GARANTIA'],
  'GARANTIA':['LABORATÓRIO','GARANTIA']
};
const SETORES=GRUPOS_SETOR[SETOR_PARAM]||(SETOR_PARAM?[SETOR_PARAM]:[]);

document.getElementById('setor-pill').textContent=SETORES.length>1?SETORES.join(' / '):(SETOR_PARAM||'TODOS');
document.title=`Envios — ${SETOR_PARAM||'Geral'}`;

let todos=[];

async function carregar(){
  document.getElementById('grid').innerHTML='<div class="loading">Carregando...</div>';
  try{
    let url=`${SB_URL}/rest/v1/protocolo_envios?deleted_at=is.null&order=data_entrega.desc,horario_entrega.desc&limit=500`;
    if(SETORES.length===1) url+=`&setor=eq.${encodeURIComponent(SETORES[0])}`;
    else if(SETORES.length>1) url+=`&setor=in.(${SETORES.map(s=>encodeURIComponent(s)).join(',')})`;
    const res=await fetch(url,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    todos=await res.json();
    document.getElementById('update-time').textContent='Última atualização: '+new Date().toLocaleTimeString('pt-BR');
    render();
  }catch(e){document.getElementById('grid').innerHTML='<div class="empty-state">Erro ao carregar.</div>';}
}

function render(){
  const busca=document.getElementById('f-busca').value.toLowerCase();
  const status=document.getElementById('f-status').value;
  const data=document.getElementById('f-data').value;
  let dados=todos.filter(r=>{
    if(status&&r.status_envio!==status) return false;
    if(data&&r.data_entrega!==data) return false;
    if(busca&&!`${r.destino} ${r.descricao_item}`.toLowerCase().includes(busca)) return false;
    return true;
  });
  document.getElementById('st-total').textContent=todos.length;
  document.getElementById('st-aguardando').textContent=todos.filter(r=>r.status_envio==='AGUARDANDO SAÍDA').length;
  document.getElementById('st-transito').textContent=todos.filter(r=>r.status_envio==='EM TRÂNSITO').length;
  document.getElementById('st-entregue').textContent=todos.filter(r=>r.status_envio==='ENTREGUE').length;
  const grid=document.getElementById('grid');
  if(!dados.length){grid.innerHTML='<div class="empty-state">Nenhum envio encontrado.</div>';return;}
  grid.innerHTML=dados.map(r=>{
    const sc=r.status_envio==='AGUARDANDO SAÍDA'?'s-aguardando':r.status_envio==='EM TRÂNSITO'?'s-transito':r.status_envio==='ENTREGUE'?'s-entregue':'s-atrasado';
    const dataFmt=r.data_entrega?.split('-').reverse().join('/');
    const rastreioHtml=r.rastreio
      ?`<div class="rastreio-box tem">📦 ${r.transportadora?r.transportadora+': ':''}${r.rastreio}</div>`
      :`<div class="rastreio-box">Rastreio ainda não disponível</div>`;
    return`<div class="envio-card">
      <div>
        <div class="envio-destino">📍 ${r.destino}</div>
        <div class="envio-desc">${r.descricao_item}</div>
        <div class="envio-meta">
          <span>👤 ${r.entregue}</span>
          <span>📅 ${dataFmt} às ${r.horario_entrega?.slice(0,5)}</span>
          <span>📤 ${r.tipo_envio||'SEMANAL'}</span>
          ${r.prazo?`<span>⏱ Prazo: ${r.prazo}d</span>`:''}
          ${r.num_os?`<span>🔧 OS: ${r.num_os}</span>`:''}
          ${r.observacao?`<span>📝 ${r.observacao}</span>`:''}
        </div>
        ${rastreioHtml}
      </div>
      <div><span class="status-badge ${sc}">${r.status_envio}</span></div>
    </div>`;
  }).join('');
}

carregar();
setInterval(carregar,120000);
</script>
</body>
</html>
